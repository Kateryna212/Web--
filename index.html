<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Click — Зворотний зв'язок</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="main-content">
        <div class="contact-card">
            <h2 class="form-title">Зворотний зв'язок</h2>
            
            <div id="formContainer">
                <form id="contactForm">
                    <div class="form-group">
                        <input type="text" id="userName" placeholder="Ваше ім'я">
                        <span class="error-text" id="nameError"></span>
                    </div>
                    
                    <div class="form-group">
                        <input type="email" id="userEmail" placeholder="Email">
                        <span class="error-text" id="emailError"></span>
                    </div>
                    
                    <div class="form-group">
                        <textarea id="userMessage" placeholder="Ваше повідомлення"></textarea>
                        <span class="error-text" id="messageError"></span>
                    </div>
                    
                    <button type="submit" class="submit-btn">Надіслати</button>
                </form>
            </div>

            <div id="successMessage" class="hidden">
                <div class="success-icon">✓</div>
                <h3>Дякую!</h3>
                <p>Ваше повідомлення надіслано успішно.</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
