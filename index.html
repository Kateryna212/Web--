<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Click — Інтерактивність</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="logo">Easy Click</div>
        <nav>
            <ul>
                <li><a href="#">Каталог</a></li>
                <li><a href="#">Кошик</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="contact-section">
            <div class="container">
                <h2>Зворотний зв'язок</h2>
                
                <form id="contactForm">
                    <div class="form-group">
                        <input type="text" id="userName" placeholder="Ваше ім'я">
                        <span class="error" id="nameError"></span>
                    </div>
                    
                    <div class="form-group">
                        <input type="email" id="userEmail" placeholder="Email">
                        <span class="error" id="emailError"></span>
                    </div>
                    
                    <div class="form-group">
                        <textarea id="userMessage" placeholder="Ваше повідомлення"></textarea>
                        <span class="error" id="messageError"></span>
                    </div>
                    
                    <button type="submit" id="submitBtn">Надіслати</button>
                </form>

                <div id="successMessage" class="hidden">
                    <div class="success-icon">✓</div>
                    <h2>Дякуємо!</h2>
                    <p>Ваше повідомлення надіслано успішно.</p>
                </div>
            </div>
        </section>

        <section class="products">
            <div class="product-grid">
                <article class="card">
                    <div class="card-img">IMG</div>
                    <h3>iPhone 15</h3>
                    <p class="price">35 000 грн</p>
                    <button class="buy-btn">В кошик</button>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Easy Click. Всі права захищені.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
