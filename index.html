<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Click — Зворотний зв'язок</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="contact-card" id="main-card">
        <h2 class="form-title">Зворотний зв'язок</h2>
        
        <form id="contactForm">
            <div class="form-group">
                <input type="text" id="userName" placeholder="Ваше ім'я" required>
            </div>
            <div class="form-group">
                <input type="email" id="userEmail" placeholder="Email" required>
            </div>
            <div class="form-group">
                <textarea id="userMessage" placeholder="Ваше повідомлення" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Надіслати</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
